<div id="st-extension-right-panel" class="st-extension-right-panel">
    <div class="st-extension-right-panel__layout">
        <div class="st-extension-right-panel__main">
            <div id="character-details-panel" class="character-details-panel"></div>
            <div id="character-details-manager" class="character-manager hidden"></div>
            <div id="character-details-floating" class="character-floating"></div>
        </div>
        <div class="st-extension-right-panel__footer">
            <button id="character-details-preview-prompts" class="layer-state character-details-preview-toggle" type="button" title="Preview prompt before image generation"><i class="fa-solid fa-eye"></i></button>
            <button id="character-details-add-guide" class="layer-state character-details-preview-toggle" type="button" title="Add guide for prompt"><i class="fa-solid fa-crosshairs"></i></button>
            <button id="character-details-free-generate" class="menu_button character-details-footer__icon-button" type="button" title="Free generation"><i class="fa-solid fa-pen-to-square"></i></button>
            <button id="character-details-portrait" class="menu_button character-details-footer__icon-button" type="button" title="Generate portrait of active character"><i class="fa-solid fa-user"></i></button>
            <button id="character-details-fullbody" class="menu_button character-details-footer__icon-button" type="button" title="Generate full body of active character"><i class="fa-solid fa-person"></i></button>
            <button id="character-details-background" class="menu_button character-details-footer__icon-button" type="button" title="Generate background"><i class="fa-solid fa-mountain-sun"></i></button>
            <button id="character-details-viewer-eyes" class="menu_button character-details-footer__icon-button" type="button" title="Generate view from viewer's eyes"><i class="fa-solid fa-eye"></i></button>
            <button id="character-details-scene" class="menu_button character-details-footer__icon-button" type="button" title="Generate current scene"><i class="fa-solid fa-people-group"></i></button>
            <button id="character-details-generate" class="menu_button character-details-footer__generate character-details-footer__icon-button" type="button" title="Generate character descriptions using LLM">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
            </button>
        </div>
    </div>
</div>

<div id="st-extension-left-panel" class="st-extension-left-panel is-desktop-collapsed is-hidden">
    <div class="st-extension-left-panel__layout">
        <div id="character-details-mods-panel" class="character-mods-panel"></div>
        <div class="st-extension-left-panel__footer">
            <button id="character-details-mods-add" class="menu_button character-details-footer__icon-button" type="button" title="Add mod">
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>
    </div>
</div>

<button id="st-extension-mobile-drawer-toggle" class="st-extension-mobile-drawer-toggle" type="button" title="Show character panel">
    <i class="fa-solid fa-angle-left"></i>
</button>
<button id="st-extension-mobile-drawer-left-toggle" class="st-extension-mobile-drawer-left-toggle displayNone" type="button" title="Show mods panel">
    <i class="fa-solid fa-angle-right"></i>
</button>
